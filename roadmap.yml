# Lunas development roadmap — single source of truth.
# Edit this file, then run `./sync.sh` in the lunas-roadmap repo to publish it
# to the interactive 2D visualization.
#
# Scope: THIS repo (the Lunas compiler + runtime). The goal is a *complete*
# web front-end framework — feature parity with mainstream frameworks (Vue et
# al.), not merely catching up to the previous Lunas. Out of scope and
# intentionally NOT tracked here: the language server (separate repo) and the
# roadmap visualization itself.
version: 1
