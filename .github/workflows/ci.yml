name: CI

on:
  push:
    branches: [main, "rewrite/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Cargo workspace lives under crates/; rust-toolchain.toml at the
        # repo root pins the toolchain for it.
        working-directory: crates
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (from rust-toolchain.toml) with components
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all
